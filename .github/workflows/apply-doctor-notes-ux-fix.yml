name: Apply doctor notes UX fix

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/apply-doctor-notes-ux-fix.yml

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update notes shortcut and new-note dates
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          page_path = Path('app/page.tsx')
          page = page_path.read_text()
          old_shortcut = 'setDoctorNotesStartNew(true); setShowDoctorNotes(true);'
          new_shortcut = 'setDoctorNotesStartNew(false); setShowDoctorNotes(true);'
          if old_shortcut not in page:
              raise SystemExit('Could not find the home action-bar new-note shortcut')
          page = page.replace(old_shortcut, new_shortcut, 1)
          page_path.write_text(page)

          notes_path = Path('components/DoctorNotesWidget.js')
          notes = notes_path.read_text()
          replacements = [
              ('function blankNote(selectedDate) {', 'function blankNote() {'),
              ('linkedDates: selectedDate ? [selectedDate] : [],', 'linkedDates: [],'),
              ('const [dateToAdd, setDateToAdd] = useState(selectedDate);', "const [dateToAdd, setDateToAdd] = useState('');"),
          ]
          for old, new in replacements:
              if old not in notes:
                  raise SystemExit(f'Could not find expected DoctorNotesWidget code: {old}')
              notes = notes.replace(old, new, 1)

          if 'blankNote(selectedDate)' not in notes:
              raise SystemExit('Could not find selected-date new-note calls')
          notes = notes.replace('blankNote(selectedDate)', 'blankNote()')

          if 'setDateToAdd(selectedDate);' not in notes:
              raise SystemExit('Could not find selected-date picker defaults')
          notes = notes.replace('setDateToAdd(selectedDate);', "setDateToAdd('');")
          notes_path.write_text(notes)

          Path('.github/workflows/apply-doctor-notes-ux-fix.yml').unlink()
          PY

      - name: Commit fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/page.tsx components/DoctorNotesWidget.js .github/workflows/apply-doctor-notes-ux-fix.yml
          git commit -m "Open notes home and leave new notes undated"
          git push origin main
