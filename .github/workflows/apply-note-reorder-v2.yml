name: Apply note reorder v2

on:
  push:
    branches: [main]
    paths:
      - .github/reorder-v2-trigger

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Patch Doctor Notes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('components/DoctorNotesWidget.js')
          s = path.read_text()

          def once(old, new, label):
              global s
              if old not in s:
                  raise RuntimeError(f'missing: {label}')
              s = s.replace(old, new, 1)

          once("const DOCTOR_LIST_CONFIG_KEY = 'doctorNoteDoctors';", "const DOCTOR_LIST_CONFIG_KEY = 'doctorNoteDoctors';\nconst DOCTOR_ORDER_CONFIG_KEY = 'doctorNoteOrder';", 'constant')

          marker = "function parseNote(row) {"
          helpers = """function parseNoteOrder(value) {
  if (!Array.isArray(value)) return [];
  return Array.from(new Set(value.filter(item => typeof item === 'string').map(item => item.trim()).filter(Boolean)));
}

function applyNoteOrder(items, orderIds) {
  if (!orderIds.length) return items;
  const positions = new Map(orderIds.map((id, index) => [id, index]));
  return items
    .map((note, originalIndex) => ({ note, originalIndex }))
    .sort((a, b) => {
      const aPosition = positions.get(a.note.id);
      const bPosition = positions.get(b.note.id);
      const aKnown = Number.isInteger(aPosition);
      const bKnown = Number.isInteger(bPosition);
      if (aKnown && bKnown) return aPosition - bPosition;
      if (aKnown !== bKnown) return aKnown ? 1 : -1;
      return a.originalIndex - b.originalIndex;
    })
    .map(item => item.note);
}

function replaceNoteInOrder(items, saved) {
  const index = items.findIndex(note => note.id === saved.id);
  if (index < 0) return [saved, ...items];
  const next = [...items];
  next[index] = saved;
  return next;
}

"""
          once(marker, helpers + marker, 'helpers')

          once("  const [confirmDeleteResponseId, setConfirmDeleteResponseId] = useState('');", "  const [confirmDeleteResponseId, setConfirmDeleteResponseId] = useState('');\n  const [reorderMode, setReorderMode] = useState(false);", 'state')
          once("  const lastTapRef = useRef({ id: '', time: 0 });", "  const lastTapRef = useRef({ id: '', time: 0 });\n  const longPressTimerRef = useRef(null);\n  const longPressStartRef = useRef(null);\n  const suppressNextNoteClickRef = useRef(false);\n  const orderSaveTimerRef = useRef(null);\n  const pendingOrderRef = useRef([]);", 'refs')

          old_load = """      fetch(`/api/config?key=${encodeURIComponent(DOCTOR_LIST_CONFIG_KEY)}`, { cache: 'no-store' })
        .then(response => response.json())
        .then(data => parseDoctorList(data.value))
        .catch(() => []),
    ])
      .then(([nextNotes, nextDoctors]) => {
        if (cancelled) return;
        setNotes(nextNotes);
        setDoctors(nextDoctors);
      })"""
          new_load = """      fetch(`/api/config?key=${encodeURIComponent(DOCTOR_LIST_CONFIG_KEY)}`, { cache: 'no-store' })
        .then(response => response.json())
        .then(data => parseDoctorList(data.value))
        .catch(() => []),
      fetch(`/api/config?key=${encodeURIComponent(DOCTOR_ORDER_CONFIG_KEY)}`, { cache: 'no-store' })
        .then(response => response.json())
        .then(data => parseNoteOrder(data.value))
        .catch(() => []),
    ])
      .then(([nextNotes, nextDoctors, nextOrder]) => {
        if (cancelled) return;
        setNotes(applyNoteOrder(nextNotes, nextOrder));
        setDoctors(nextDoctors);
      })"""
          once(old_load, new_load, 'load order')

          once("  function closeHeader() {\n    if (respondingTo || cleanupNote || cleanupDraft) {", "  function closeHeader() {\n    if (reorderMode) {\n      finishReorderMode();\n      return;\n    }\n    if (respondingTo || cleanupNote || cleanupDraft) {", 'close mode')

          functions = """  function clearLongPressTimer() {
    if (longPressTimerRef.current) window.clearTimeout(longPressTimerRef.current);
    longPressTimerRef.current = null;
    longPressStartRef.current = null;
  }

  function beginNoteLongPress(event) {
    if (reorderMode || (event.pointerType === 'mouse' && event.button !== 0)) return;
    if (event.target instanceof Element && event.target.closest('button, input, textarea, select, a')) return;
    clearLongPressTimer();
    longPressStartRef.current = { pointerId: event.pointerId, x: event.clientX, y: event.clientY };
    longPressTimerRef.current = window.setTimeout(() => {
      suppressNextNoteClickRef.current = true;
      setSearch('');
      setSwipedNoteId('');
      setConfirmDeleteId('');
      setReorderMode(true);
      navigator.vibrate?.(25);
      clearLongPressTimer();
    }, 550);
  }

  function trackNoteLongPress(event) {
    const start = longPressStartRef.current;
    if (!start || start.pointerId !== event.pointerId) return;
    if (Math.abs(event.clientX - start.x) > 12 || Math.abs(event.clientY - start.y) > 12) clearLongPressTimer();
  }

  async function persistNoteOrderIds(ids) {
    try {
      const response = await fetch('/api/config', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ key: DOCTOR_ORDER_CONFIG_KEY, value: ids }),
      });
      if (!response.ok) throw new Error('Could not save note order.');
    } catch {
      setError('The notes moved here, but their order could not sync.');
    }
  }

  function queueNoteOrderSave(nextNotes) {
    pendingOrderRef.current = nextNotes.map(note => note.id);
    if (orderSaveTimerRef.current) window.clearTimeout(orderSaveTimerRef.current);
    orderSaveTimerRef.current = window.setTimeout(() => {
      orderSaveTimerRef.current = null;
      void persistNoteOrderIds(pendingOrderRef.current);
    }, 180);
  }

  function moveNote(noteId, direction) {
    const index = notes.findIndex(note => note.id === noteId);
    const targetIndex = index + direction;
    if (index < 0 || targetIndex < 0 || targetIndex >= notes.length) return;
    const next = [...notes];
    [next[index], next[targetIndex]] = [next[targetIndex], next[index]];
    setNotes(next);
    queueNoteOrderSave(next);
  }

  function finishReorderMode() {
    clearLongPressTimer();
    if (orderSaveTimerRef.current) window.clearTimeout(orderSaveTimerRef.current);
    orderSaveTimerRef.current = null;
    pendingOrderRef.current = notes.map(note => note.id);
    void persistNoteOrderIds(pendingOrderRef.current);
    setReorderMode(false);
    suppressNextNoteClickRef.current = false;
  }

"""
          once("  function noteSwipeHandlers(note) {", functions + "  function noteSwipeHandlers(note) {", 'functions')

          saved_block = "    setNotes(previous => [saved, ...previous.filter(note => note.id !== saved.id)]\n      .sort((a, b) => Number(b.pinned) - Number(a.pinned) || b.updatedAt.localeCompare(a.updatedAt)));"
          if s.count(saved_block) < 2:
              raise RuntimeError('saved note blocks not found')
          s = s.replace(saved_block, "    setNotes(previous => replaceNoteInOrder(previous, saved));")

          toolbar = """              <div className="mb-3 grid min-w-0 grid-cols-[minmax(0,1fr)_auto] gap-2">
                <input value={search} onChange={event => setSearch(event.currentTarget.value)} placeholder="Search symptoms, doctors, dates…" className="min-h-11 w-full min-w-0 rounded-xl border border-stone-200 bg-white px-3 py-2.5" style={{ fontSize: 16 }} />
                <button type="button" onClick={startNew} className="min-h-11 rounded-xl px-4 text-sm font-bold text-white" style={{ background: '#7E9B86' }}>+ New</button>
              </div>"""
          reorder_toolbar = """              {reorderMode ? (
                <div className="mb-3 flex min-w-0 items-center justify-between gap-3 rounded-2xl border border-[#CAD9CF] bg-[#E4ECE6] px-3 py-2.5">
                  <div className="min-w-0">
                    <p className="text-sm font-bold text-[#476653]">Reorder notes</p>
                    <p className="text-[11px] leading-snug text-[#5F7666]">Use the arrows, then tap Done.</p>
                  </div>
                  <button type="button" onClick={finishReorderMode} className="min-h-10 flex-shrink-0 rounded-xl bg-white px-4 py-2 text-xs font-bold text-[#476653]">Done</button>
                </div>
              ) : (
                <>
                  <div className="mb-1.5 grid min-w-0 grid-cols-[minmax(0,1fr)_auto] gap-2">
                    <input value={search} onChange={event => setSearch(event.currentTarget.value)} placeholder="Search symptoms, doctors, dates…" className="min-h-11 w-full min-w-0 rounded-xl border border-stone-200 bg-white px-3 py-2.5" style={{ fontSize: 16 }} />
                    <button type="button" onClick={startNew} className="min-h-11 rounded-xl px-4 text-sm font-bold text-white" style={{ background: '#7E9B86' }}>+ New</button>
                  </div>
                  {notes.length > 1 && <p className="mb-3 px-1 text-[10px] text-stone-400">Press and hold a note to reorder.</p>}
                </>
              )}"""
          once(toolbar, reorder_toolbar, 'toolbar')

          once("                          {(swipedNoteId === note.id || confirmDeleteId === note.id) && (", "                          {!reorderMode && (swipedNoteId === note.id || confirmDeleteId === note.id) && (", 'swipe delete')
          once("style={{ transform: swipedNoteId === note.id ? 'translateX(-5.75rem)' : 'translateX(0)' }}", "style={{ transform: !reorderMode && swipedNoteId === note.id ? 'translateX(-5.75rem)' : 'translateX(0)' }}", 'swipe transform')

          article = """                            <article
                              onClick={() => {
                                if (swipedNoteId === note.id) {"""
          article_new = """                            <article
                              onPointerDown={beginNoteLongPress}
                              onPointerMove={trackNoteLongPress}
                              onPointerUp={clearLongPressTimer}
                              onPointerCancel={clearLongPressTimer}
                              onPointerLeave={clearLongPressTimer}
                              onContextMenu={event => event.preventDefault()}
                              onClick={() => {
                                if (reorderMode || suppressNextNoteClickRef.current) {
                                  suppressNextNoteClickRef.current = false;
                                  return;
                                }
                                if (swipedNoteId === note.id) {"""
          once(article, article_new, 'long press article')

          once("""                              className="min-w-0 cursor-pointer overflow-hidden rounded-2xl border border-stone-100 bg-white p-3 shadow-sm active:scale-[0.995]"
                              style={{ touchAction: 'pan-y' }}
                              {...noteSwipeHandlers(note)}""", """                              className={`min-w-0 overflow-hidden rounded-2xl border bg-white p-3 shadow-sm ${reorderMode ? 'cursor-default border-[#CAD9CF] ring-2 ring-[#7E9B86]/20' : 'cursor-pointer border-stone-100 active:scale-[0.995]'}`}
                              style={{ touchAction: reorderMode ? 'none' : 'pan-y' }}
                              {...(reorderMode ? {} : noteSwipeHandlers(note))}""", 'article style')

          photo = "                                {note.photoAttachments.length > 0 && <img src={note.photoAttachments[0].dataUrl} alt=\"\" className=\"h-14 w-14 flex-shrink-0 rounded-xl object-cover\" />}"
          arrows = """                                {reorderMode ? (
                                  <div className="grid flex-shrink-0 grid-rows-2 gap-1">
                                    <button type="button" onClick={event => { event.stopPropagation(); moveNote(note.id, -1); }} disabled={notes.findIndex(item => item.id === note.id) === 0} className="flex h-9 w-10 items-center justify-center rounded-lg bg-[#E4ECE6] text-lg font-bold text-[#476653] disabled:opacity-25" aria-label={`Move ${note.title || typeLabel(note.kind)} up`}>↑</button>
                                    <button type="button" onClick={event => { event.stopPropagation(); moveNote(note.id, 1); }} disabled={notes.findIndex(item => item.id === note.id) === notes.length - 1} className="flex h-9 w-10 items-center justify-center rounded-lg bg-[#E4ECE6] text-lg font-bold text-[#476653] disabled:opacity-25" aria-label={`Move ${note.title || typeLabel(note.kind)} down`}>↓</button>
                                  </div>
                                ) : note.photoAttachments.length > 0 ? (
                                  <img src={note.photoAttachments[0].dataUrl} alt="" className="h-14 w-14 flex-shrink-0 rounded-xl object-cover" />
                                ) : null}"""
          once(photo, arrows, 'arrows')

          once("                              <div className=\"mt-2 flex min-w-0 flex-wrap items-center gap-1.5\">", "                              {!reorderMode && <div className=\"mt-2 flex min-w-0 flex-wrap items-center gap-1.5\">", 'actions open')
          action_end = """                              </div>
                            </article>"""
          once(action_end, """                              </div>}
                            </article>""", 'actions close')
          once("                        {responses.length > 0 && (", "                        {!reorderMode && responses.length > 0 && (", 'hide responses')

          path.write_text(s)
          for cleanup in [
              Path('.github/workflows/apply-doctor-note-reorder.yml'),
              Path('.github/workflows/apply-note-reorder-v2.yml'),
              Path('.github/reorder-v2-trigger'),
          ]:
              if cleanup.exists(): cleanup.unlink()
          PY

      - name: Commit changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add components/DoctorNotesWidget.js .github/workflows .github/reorder-v2-trigger
          git commit -m "Add persistent long-press note reordering"
          git push origin main
