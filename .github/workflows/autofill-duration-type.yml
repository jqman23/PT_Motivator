name: Autofill duration type

on:
  push:
    paths:
      - '.github/workflows/autofill-duration-type.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Autofill DUR from d
        shell: python
        run: |
          from pathlib import Path

          path = Path('components/ExerciseGestureEnhancer.jsx')
          text = path.read_text()
          old = """                onChange={event => {
                  const kindText = event.target.value;
                  updateDraft({ kindText, mode: modeFromKind(kindText, draft.mode) });
                }}"""
          new = """                onChange={event => {
                  const kindText = event.target.value;
                  if (kindText.trim().toLowerCase().startsWith('d')) {
                    updateDraft({ kindText: 'DUR', mode: 'duration' });
                    return;
                  }
                  updateDraft({ kindText, mode: modeFromKind(kindText, draft.mode) });
                }}"""
          if old not in text:
              raise SystemExit('Expected Type input handler not found')
          path.write_text(text.replace(old, new, 1))
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add components/ExerciseGestureEnhancer.jsx
          git commit -m "Autofill DUR when typing d" || exit 0
          git push origin HEAD:main
