name: Fix history hold

on:
  push:
    paths:
      - '.github/workflows/fix-history-hold.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Fix hold timing and pointer state
        shell: python
        run: |
          from pathlib import Path

          path = Path('components/ExerciseGestureEnhancer.jsx')
          text = path.read_text()
          text = text.replace('const HOLD_MS = 1000;', 'const HOLD_MS = 1500;')

          old = """        holdTimer = window.setTimeout(() => {
                    if (!pointerStart) return;
                    blockNextClick = true;
                    clearSingleTap();
                    lastTapAt = 0;
                    try {
                      card.dispatchEvent(new PointerEvent('pointercancel', {
                        bubbles: true,
                        pointerId: pointerStart.pointerId,
                        pointerType: pointerStart.pointerType,
                      }));
                    } catch {}
                    try { navigator.vibrate?.(18); } catch {}
                    card.dispatchEvent(new MouseEvent('contextmenu', {
                      bubbles: true,
                      cancelable: true,
                      button: 2,
                      clientX: pointerStart.x,
                      clientY: pointerStart.y,
                    }));
                    pointerStart = null;
                  }, HOLD_MS);"""

          new = """        holdTimer = window.setTimeout(() => {
                    if (!pointerStart) return;
                    const holdPoint = pointerStart;
                    blockNextClick = true;
                    clearSingleTap();
                    lastTapAt = 0;
                    try {
                      card.dispatchEvent(new PointerEvent('pointercancel', {
                        bubbles: true,
                        pointerId: holdPoint.pointerId,
                        pointerType: holdPoint.pointerType,
                      }));
                    } catch {}
                    try { navigator.vibrate?.(18); } catch {}
                    card.dispatchEvent(new MouseEvent('contextmenu', {
                      bubbles: true,
                      cancelable: true,
                      button: 2,
                      clientX: holdPoint.x,
                      clientY: holdPoint.y,
                    }));
                    pointerStart = null;
                  }, HOLD_MS);"""

          if old not in text:
              raise SystemExit('Expected history hold block was not found')

          text = text.replace(old, new)
          text = text.replace('Hold 1 second for history.', 'Hold 1.5 seconds for history.')
          path.write_text(text)
      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add components/ExerciseGestureEnhancer.jsx
          git commit -m "Fix 1.5 second history hold"
          git push origin main
