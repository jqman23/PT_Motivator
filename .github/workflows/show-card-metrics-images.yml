name: Add exercise card metrics and images

on:
  push:
    paths:
      - '.github/workflows/show-card-metrics-images.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Patch exercise cards and metric events
        shell: python
        run: |
          from pathlib import Path

          card_path = Path('components/ExerciseCard.tsx')
          card = card_path.read_text()

          old = """const HISTORY_HOLD_MS = 2000;

async function getConfigValue<T>(key: string, fallback: T): Promise<T> {"""
          new = """const HISTORY_HOLD_MS = 2000;

type ExerciseMetric = {
  sets_count?: number | string | null;
  reps_count?: number | string | null;
  duration_seconds?: number | string | null;
};

type MetricSavedDetail = {
  exerciseId?: string;
  date?: string;
  metric?: ExerciseMetric | null;
};

function getPrimaryImage(exercise: Exercise) {
  return exercise.mainImageUrls?.find(url => !!url?.trim())?.trim() || exercise.mainImageUrl?.trim() || '';
}

function formatMetricSummary(metric?: ExerciseMetric | null) {
  if (!metric) return '';
  const sets = Number(metric.sets_count || 0);
  const reps = Number(metric.reps_count || 0);
  const seconds = Number(metric.duration_seconds || 0);
  const prefix = sets > 0 ? `${sets}x` : '';
  if (reps > 0) return `${prefix}${reps} reps`;
  if (seconds > 0) return `${prefix}${seconds} ${seconds === 1 ? 'sec' : 'secs'}`;
  return '';
}

async function getConfigValue<T>(key: string, fallback: T): Promise<T> {"""
          if old not in card:
              raise SystemExit('Could not find ExerciseCard helper insertion point')
          card = card.replace(old, new, 1)

          old = """  const [swipeX, setSwipeX] = useState(0);
  const [swipeOpen, setSwipeOpen] = useState(false);
  const longPressTimer = useRef<ReturnType<typeof setTimeout> | null>(null);"""
          new = """  const [swipeX, setSwipeX] = useState(0);
  const [swipeOpen, setSwipeOpen] = useState(false);
  const [metricSummary, setMetricSummary] = useState('');
  const longPressTimer = useRef<ReturnType<typeof setTimeout> | null>(null);"""
          if old not in card:
              raise SystemExit('Could not find ExerciseCard state insertion point')
          card = card.replace(old, new, 1)

          old = """  const checkColor = done
    ? 'bg-[#7E9B86] border-[#7E9B86]'
    : 'bg-white border-stone-200';
  const typeTheme = getExerciseTypeTheme(exercise.cat);"""
          new = """  const checkColor = done
    ? 'bg-[#7E9B86] border-[#7E9B86]'
    : 'bg-white border-stone-200';
  const primaryImage = getPrimaryImage(exercise);
  const showPrimaryImage = !done && !!primaryImage;
  const typeTheme = getExerciseTypeTheme(exercise.cat);"""
          if old not in card:
              raise SystemExit('Could not find ExerciseCard image state insertion point')
          card = card.replace(old, new, 1)

          old = """  useEffect(() => {
    if (!showTypePicker) setTypeDraft(normalizeExerciseType(exercise.cat));
  }, [exercise.cat, showTypePicker]);

  const closeSwipe = () => {"""
          new = """  useEffect(() => {
    if (!showTypePicker) setTypeDraft(normalizeExerciseType(exercise.cat));
  }, [exercise.cat, showTypePicker]);

  useEffect(() => {
    let cancelled = false;

    const loadMetric = async () => {
      try {
        const response = await fetch(`/api/exercise-metrics?date=${encodeURIComponent(today)}&exerciseId=${encodeURIComponent(exercise.id)}`, {
          cache: 'no-store',
        });
        if (!response.ok) return;
        const data = await response.json();
        if (!cancelled) setMetricSummary(formatMetricSummary(data.current));
      } catch {
        if (!cancelled) setMetricSummary('');
      }
    };

    const handleMetricSaved = (event: Event) => {
      const detail = (event as CustomEvent<MetricSavedDetail>).detail;
      if (detail?.exerciseId !== exercise.id || detail?.date !== today) return;
      setMetricSummary(formatMetricSummary(detail.metric));
    };

    void loadMetric();
    window.addEventListener('pt-exercise-metrics-saved', handleMetricSaved);
    return () => {
      cancelled = true;
      window.removeEventListener('pt-exercise-metrics-saved', handleMetricSaved);
    };
  }, [exercise.id, today]);

  const closeSwipe = () => {"""
          if old not in card:
              raise SystemExit('Could not find ExerciseCard metric effect insertion point')
          card = card.replace(old, new, 1)

          old = """          <div
            className={`sm:hidden flex-shrink-0 w-7 h-10 rounded-xl flex items-center justify-center transition-all ${showMoveControls ? 'bg-[#E4ECE6] text-[#7E9B86]' : 'text-stone-300'}`}
            style={{ touchAction: 'manipulation' }}
            title="Move exercise"
            onClick={(e) => {
              e.stopPropagation();
              suppressNextClick.current = true;
              closeSwipe();
              setShowMoveControls(prev => !prev);
            }}
            onPointerDown={(e) => {
              clearLongPress();
              e.stopPropagation();
            }}
          >
            <svg viewBox="0 0 12 18" fill="currentColor" className="w-3 h-4">
              <circle cx="3" cy="4" r="1.4" />
              <circle cx="9" cy="4" r="1.4" />
              <circle cx="3" cy="9" r="1.4" />
              <circle cx="9" cy="9" r="1.4" />
              <circle cx="3" cy="14" r="1.4" />
              <circle cx="9" cy="14" r="1.4" />
            </svg>
          </div>

          <div className={`flex-shrink-0 w-6 h-6 rounded-lg border-2 flex items-center justify-center transition-all duration-150 ${checkColor}`}>
            {done && (
              <svg viewBox="0 0 16 16" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="w-3.5 h-3.5">
                <polyline points="2.5 8 6.5 12 13.5 4" />
              </svg>
            )}
          </div>"""
          new = """          {showPrimaryImage ? (
            <div className="relative sm:hidden flex-shrink-0 w-[72px] h-12 overflow-hidden rounded-xl border border-stone-200 bg-stone-100 shadow-sm">
              <img
                src={primaryImage}
                alt=""
                loading="lazy"
                draggable={false}
                className="absolute inset-0 h-full w-full object-cover"
              />
              <div className="pointer-events-none absolute inset-0 bg-gradient-to-r from-black/25 via-transparent to-black/10" />
              <div
                className={`absolute inset-y-0 left-0 z-10 flex w-7 items-center justify-center transition-all ${showMoveControls ? 'bg-[#E4ECE6]/95 text-[#476653]' : 'bg-black/25 text-white'}`}
                style={{ touchAction: 'manipulation' }}
                title="Move exercise"
                onClick={(e) => {
                  e.stopPropagation();
                  suppressNextClick.current = true;
                  closeSwipe();
                  setShowMoveControls(prev => !prev);
                }}
                onPointerDown={(e) => {
                  clearLongPress();
                  e.stopPropagation();
                }}
              >
                <svg viewBox="0 0 12 18" fill="currentColor" className="w-3 h-4 drop-shadow">
                  <circle cx="3" cy="4" r="1.4" />
                  <circle cx="9" cy="4" r="1.4" />
                  <circle cx="3" cy="9" r="1.4" />
                  <circle cx="9" cy="9" r="1.4" />
                  <circle cx="3" cy="14" r="1.4" />
                  <circle cx="9" cy="14" r="1.4" />
                </svg>
              </div>
              <div className="absolute right-1.5 top-1/2 z-10 flex h-7 w-7 -translate-y-1/2 items-center justify-center rounded-lg border-2 border-white/90 bg-white/90 shadow-sm" />
            </div>
          ) : (
            <div
              className={`sm:hidden flex-shrink-0 w-7 h-10 rounded-xl flex items-center justify-center transition-all ${showMoveControls ? 'bg-[#E4ECE6] text-[#7E9B86]' : 'text-stone-300'}`}
              style={{ touchAction: 'manipulation' }}
              title="Move exercise"
              onClick={(e) => {
                e.stopPropagation();
                suppressNextClick.current = true;
                closeSwipe();
                setShowMoveControls(prev => !prev);
              }}
              onPointerDown={(e) => {
                clearLongPress();
                e.stopPropagation();
              }}
            >
              <svg viewBox="0 0 12 18" fill="currentColor" className="w-3 h-4">
                <circle cx="3" cy="4" r="1.4" />
                <circle cx="9" cy="4" r="1.4" />
                <circle cx="3" cy="9" r="1.4" />
                <circle cx="9" cy="9" r="1.4" />
                <circle cx="3" cy="14" r="1.4" />
                <circle cx="9" cy="14" r="1.4" />
              </svg>
            </div>
          )}

          <div className={`${showPrimaryImage ? 'hidden sm:flex' : 'flex'} flex-shrink-0 w-6 h-6 rounded-lg border-2 items-center justify-center transition-all duration-150 ${checkColor}`}>
            {done && (
              <svg viewBox="0 0 16 16" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="w-3.5 h-3.5">
                <polyline points="2.5 8 6.5 12 13.5 4" />
              </svg>
            )}
          </div>"""
          if old not in card:
              raise SystemExit('Could not find ExerciseCard grip and checkbox block')
          card = card.replace(old, new, 1)

          old = """                {exercise.name}
                {exercise.optional && <span className="ml-1 text-xs text-stone-400">(optional)</span>}"""
          new = """                {exercise.name}
                {metricSummary && <span className="ml-1 text-[11px] font-semibold text-[#7E9B86]">({metricSummary})</span>}
                {exercise.optional && <span className="ml-1 text-xs text-stone-400">(optional)</span>}"""
          if old not in card:
              raise SystemExit('Could not find ExerciseCard title block')
          card = card.replace(old, new, 1)
          card_path.write_text(card)

          gesture_path = Path('components/ExerciseGestureEnhancer.jsx')
          gesture = gesture_path.read_text()

          old = """          const data = await response.json();
          if (!response.ok) throw new Error(data.error || 'Could not clear.');
        }
        dirtyRef.current = false;"""
          new = """          const data = await response.json();
          if (!response.ok) throw new Error(data.error || 'Could not clear.');
        }
        window.dispatchEvent(new CustomEvent('pt-exercise-metrics-saved', {
          detail: { exerciseId: active.exerciseId, date: active.date, metric: null },
        }));
        dirtyRef.current = false;"""
          if old not in gesture:
              raise SystemExit('Could not find metric clear event insertion point')
          gesture = gesture.replace(old, new, 1)

          old = """      const data = await response.json();
      if (!response.ok) throw new Error(data.error || 'Could not save.');
      dirtyRef.current = false;"""
          new = """      const data = await response.json();
      if (!response.ok) throw new Error(data.error || 'Could not save.');
      window.dispatchEvent(new CustomEvent('pt-exercise-metrics-saved', {
        detail: { exerciseId: active.exerciseId, date: active.date, metric: data.metric ?? null },
      }));
      dirtyRef.current = false;"""
          if old not in gesture:
              raise SystemExit('Could not find metric save event insertion point')
          gesture = gesture.replace(old, new, 1)
          gesture_path.write_text(gesture)
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add components/ExerciseCard.tsx components/ExerciseGestureEnhancer.jsx
          git commit -m "Show daily exercise metrics and primary images on cards"
          git push origin HEAD:main