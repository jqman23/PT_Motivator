name: Stabilize exercise gestures

on:
  push:
    paths:
      - '.github/workflows/stabilize-exercise-gestures.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Patch gesture and tile observers
        run: |
          python - <<'PY'
          from pathlib import Path

          gesture = Path('components/ExerciseGestureEnhancer.jsx')
          text = gesture.read_text()
          text = text.replace('const DOUBLE_TAP_MS = 285;', 'const DOUBLE_TAP_MS = 400;', 1)
          old = """      const onDoubleClick = event => {
        if (isInteractiveTarget(event.target)) return;
        preventCardAction(event);
        openQuickLog(card, event.clientX);
      };

"""
          if old not in text:
              raise SystemExit('double-click block not found')
          text = text.replace(old, '', 1)
          text = text.replace("      card.addEventListener('dblclick', onDoubleClick, true);\n", '', 1)
          text = text.replace("        card.removeEventListener('dblclick', onDoubleClick, true);\n", '', 1)
          gesture.write_text(text)

          tile = Path('components/ExerciseTileMetadataEnhancer.tsx')
          text = tile.read_text()
          old = """      let badge = title.querySelector<HTMLElement>('[data-daily-exercise-metric=\"true\"]');
      if (!force && badge?.dataset.metricKey === key) return;
"""
          new = """      let badge = title.querySelector<HTMLElement>('[data-daily-exercise-metric=\"true\"]');
      if (!force && card.dataset.dailyMetricKey === key) return;
"""
          if old not in text:
              raise SystemExit('metric cache block not found')
          text = text.replace(old, new, 1)
          old = """        const label = metricLabel(data.current);

        badge = title.querySelector<HTMLElement>('[data-daily-exercise-metric=\"true\"]');
"""
          new = """        const label = metricLabel(data.current);
        card.dataset.dailyMetricKey = key;

        badge = title.querySelector<HTMLElement>('[data-daily-exercise-metric=\"true\"]');
"""
          if old not in text:
              raise SystemExit('metric response block not found')
          text = text.replace(old, new, 1)
          old = """    const observer = new MutationObserver(() => scanCards(false));
    observer.observe(document.body, { childList: true, subtree: true, attributes: true, attributeFilter: ['class'] });
"""
          new = """    let scanFrame = 0;
    const observer = new MutationObserver(() => {
      if (scanFrame) return;
      scanFrame = window.requestAnimationFrame(() => {
        scanFrame = 0;
        scanCards(false);
      });
    });
    observer.observe(document.body, { childList: true, subtree: true });
"""
          if old not in text:
              raise SystemExit('observer block not found')
          text = text.replace(old, new, 1)
          old = """      observer.disconnect();
      document.removeEventListener('click', onClick, true);
      window.clearInterval(dateTimer);
"""
          new = """      observer.disconnect();
      if (scanFrame) window.cancelAnimationFrame(scanFrame);
      document.removeEventListener('click', onClick, true);
      window.clearInterval(dateTimer);
"""
          if old not in text:
              raise SystemExit('observer cleanup block not found')
          text = text.replace(old, new, 1)
          tile.write_text(text)
          PY
      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add components/ExerciseGestureEnhancer.jsx components/ExerciseTileMetadataEnhancer.tsx
          git commit -m "Stabilize exercise double tap and tile updates"
          git push origin HEAD:main
